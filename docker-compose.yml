# =============================================================================
# Lazarus — Docker Compose (Phase 1 infra only)
# =============================================================================
# Brings up the four backbone services on a shared Docker network:
#   kafka · redis · prometheus · grafana
#
# App services (orchestrator, remediation-engine) are added in later phases.
#
# Prerequisites:
#   cp .env.example .env   (edit GF_SECURITY_ADMIN_PASSWORD if you like)
#
# Common commands (Makefile — Subtask 6):
#   make infra-up
#   make infra-ps
#   make infra-logs-kafka
#   make infra-down
#
# Credentials: no external accounts required for this stack. Grafana admin
# login comes from GF_SECURITY_* in .env (self-hosted, not grafana.com).
# =============================================================================

name: ${COMPOSE_PROJECT_NAME:-lazarus}

services:

  # ── Kafka (KRaft, single-node) ─────────────────────────────────────────────
  # Event backbone for infrastructure-anomalies topic (Phase 1+ ingestion).
  # Image pin: Master Plan §4 — Kafka 3.7 KRaft, no Zookeeper.
  # bitnami/kafka:3.7 was removed from Docker Hub (Bitnami catalog migration, Jan 2025+).
  # bitnamilegacy/kafka:3.7.1-debian-12-r0 is the same Bitnami image — env vars unchanged.
  kafka:
    image: bitnamilegacy/kafka:3.7.1-debian-12-r0
    container_name: lazarus-kafka
    restart: unless-stopped
    networks:
      - lazarus-mesh
    ports:
      # Host :9092 → container EXTERNAL listener :9094 (see listeners below).
      # In-mesh clients use kafka:9092 on the PLAINTEXT listener instead.
      - "${KAFKA_HOST_PORT:-9092}:9094"
    environment:
      # KRaft = Kafka runs its own metadata quorum (no Zookeeper container).
      KAFKA_ENABLE_KRAFT: "yes"
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER

      # Dual listeners solve the classic Docker Kafka problem:
      #   • PLAINTEXT :9092  → advertised as kafka:9092 for containers on lazarus-mesh
      #                        (matches KAFKA_BROKERS=kafka:9092 in .env)
      #   • EXTERNAL  :9094  → advertised as localhost:${KAFKA_HOST_PORT} for your
      #                        laptop (k6, curl, local NestJS during dev)
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,EXTERNAL://:9094,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:${KAFKA_HOST_PORT:-9092}
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: PLAINTEXT

      # Topics (e.g. infrastructure-anomalies) appear on first produce.
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"

      # JVM cap — 512 MB default per Master Plan §4 VPS budget (.env override).
      KAFKA_HEAP_OPTS: ${KAFKA_HEAP_OPTS:--Xmx512m -Xms512m}
    volumes:
      # Persists broker log segments across container restarts.
      - kafka_data:/bitnami/kafka
    healthcheck:
      # KRaft boot can take 30–45s on first start; start_period avoids false "unhealthy".
      test:
        [
          "CMD-SHELL",
          "kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1 || exit 1",
        ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 45s

  # ── Redis (Streams reply bus) ────────────────────────────────────────────────
  # Low-latency path for validated-remediations stream (Phase 2+).
  # No password in dev — matches REDIS_URL=redis://redis:6379 in .env.
  redis:
    image: redis:7-alpine
    container_name: lazarus-redis
    restart: unless-stopped
    networks:
      - lazarus-mesh
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    command:
      # Dev-friendly: skip RDB snapshots and AOF — less disk I/O on OneDrive paths.
      - redis-server
      - --save
      - ""
      - --appendonly
      - "no"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # ── Prometheus (metrics TSDB) ──────────────────────────────────────────────
  # Scrapes targets defined in infra/prometheus/prometheus.yml (Subtask 3).
  # Phase 1: self-scrape only. Phase 4: uncomment orchestrator job in prometheus.yml.
  prometheus:
    image: prom/prometheus:latest
    container_name: lazarus-prometheus
    restart: unless-stopped
    networks:
      - lazarus-mesh
    ports:
      - "${PROMETHEUS_HOST_PORT:-9090}:9090"
    volumes:
      # Config from git (read-only). TSDB data goes to named volume below.
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      # Retention from .env — change PROMETHEUS_RETENTION_TIME without editing this file.
      - --storage.tsdb.retention.time=${PROMETHEUS_RETENTION_TIME:-15d}
      # Allows POST to /-/reload after prometheus.yml edits (optional ops path).
      - --web.enable-lifecycle
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── Grafana (dashboards) ─────────────────────────────────────────────────────
  # Auto-loads datasource + dashboards from infra/grafana/provisioning/ (Subtask 4).
  # Login: GF_SECURITY_ADMIN_USER / GF_SECURITY_ADMIN_PASSWORD from .env (not SSO).
  grafana:
    image: grafana/grafana:latest
    container_name: lazarus-grafana
    restart: unless-stopped
    networks:
      - lazarus-mesh
    ports:
      - "${GRAFANA_HOST_PORT:-3000}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:-change-me-grafana-admin}
      GF_USERS_ALLOW_SIGN_UP: ${GF_USERS_ALLOW_SIGN_UP:-false}
      GF_SERVER_ROOT_URL: ${GF_SERVER_ROOT_URL:-http://localhost:3000}
    volumes:
      # Provisioning: datasources + dashboard JSON (read-only).
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      # SQLite DB, plugins, UI edits — persisted across restarts.
      - grafana_data:/var/lib/grafana
    depends_on:
      # Wait until Prometheus /-/healthy before starting Grafana (clean first login).
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

# Shared bridge network — all current and future Lazarus services attach here.
# Explicit name lets you: docker network inspect lazarus-mesh
networks:
  lazarus-mesh:
    name: lazarus-mesh
    driver: bridge

# Named volumes survive `docker compose down` (omit -v to keep data).
volumes:
  kafka_data:
  prometheus_data:
  grafana_data:
