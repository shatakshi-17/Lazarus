name: ${COMPOSE_PROJECT_NAME:-lazarus}

services:

  # bitnami/kafka:3.7 delisted — bitnamilegacy preserves identical Bitnami env contract.
  kafka:
    image: bitnamilegacy/kafka:3.7.1-debian-12-r0
    container_name: lazarus-kafka
    restart: unless-stopped
    networks:
      - lazarus-mesh
    ports:
      - "${KAFKA_HOST_PORT:-9092}:9094"
    environment:
      KAFKA_ENABLE_KRAFT: "yes"
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER

      # Dual advertised listeners — PLAINTEXT for lazarus-mesh, EXTERNAL for host-side clients.
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,EXTERNAL://:9094,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:${KAFKA_HOST_PORT:-9092}
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: PLAINTEXT

      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"

      # JVM cap — Master Plan §4 KVM2 VPS budget.
      KAFKA_HEAP_OPTS: ${KAFKA_HEAP_OPTS:--Xmx512m -Xms512m}
    volumes:
      - kafka_data:/bitnami/kafka
    healthcheck:
      # KRaft cold boot exceeds default probe window; extended start_period avoids flapping unhealthy.
      test:
        [
          "CMD-SHELL",
          "kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1 || exit 1",
        ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 45s

  # No auth in dev — production must terminate TLS and require ACL/password outside this stack.
  redis:
    image: redis:7-alpine
    container_name: lazarus-redis
    restart: unless-stopped
    networks:
      - lazarus-mesh
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    command:
      # Disable persistence — cuts OneDrive-synced workspace disk churn (plan risk R6).
      - redis-server
      - --save
      - ""
      - --appendonly
      - "no"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  prometheus:
    image: prom/prometheus:latest
    container_name: lazarus-prometheus
    restart: unless-stopped
    networks:
      - lazarus-mesh
    ports:
      - "${PROMETHEUS_HOST_PORT:-9090}:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      # Retention tunable via .env without compose edits.
      - --storage.tsdb.retention.time=${PROMETHEUS_RETENTION_TIME:-15d}
      - --web.enable-lifecycle
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  grafana:
    image: grafana/grafana:latest
    container_name: lazarus-grafana
    restart: unless-stopped
    networks:
      - lazarus-mesh
    ports:
      - "${GRAFANA_HOST_PORT:-3000}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:-change-me-grafana-admin}
      GF_USERS_ALLOW_SIGN_UP: ${GF_USERS_ALLOW_SIGN_UP:-false}
      GF_SERVER_ROOT_URL: ${GF_SERVER_ROOT_URL:-http://localhost:3000}
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      # Avoid datasource errors on first login when Prometheus is still starting.
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

# Explicit network name — stable DNS for future app services on the same mesh.
networks:
  lazarus-mesh:
    name: lazarus-mesh
    driver: bridge

volumes:
  kafka_data:
  prometheus_data:
  grafana_data:
