# Retention and runtime flags live in docker-compose (.env); this file is scrape config only.

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: lazarus
    environment: development

# Deferred until Phase 4+ SLO alert rules.
rule_files: []
  # - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090
        labels:
          service: prometheus

  # App jobs commented out — avoids permanent DOWN targets before Phase 4 metrics exist.
